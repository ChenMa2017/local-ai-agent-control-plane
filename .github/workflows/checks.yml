name: Checks

on:
  push:
  pull_request:

jobs:
  full-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Install Python test dependency
        run: |
          python -m pip install --upgrade pip
          pip install -r modules/discord-adapter/requirements.txt

      - name: Run control-plane safety tools
        run: |
          python3 -m py_compile scripts/control_plane.py tests/test_control_plane.py
          python3 -m unittest tests/test_control_plane.py

      - name: Run codex-bridge checks
        run: |
          cd modules/codex-bridge
          node --check scripts/codex-bridge.js
          npm test

      - name: Run agent-host checks
        run: |
          cd modules/agent-host
          python3 -m compileall -q bridge.py agent_host tests
          python3 -m unittest discover -s tests

      - name: Run discord-adapter checks
        run: |
          cd modules/discord-adapter
          python3 -m py_compile bot.py agent_host_client.py tests/test_agent_host_client.py
          python3 -m unittest discover -s tests

      - name: Run host-ops checks
        run: |
          cd modules/host-ops
          python3 -m py_compile host_ops.py tests/test_host_ops.py
          python3 -m unittest discover -s tests

      - name: Run codex-watchdog-vscode checks
        run: |
          cd modules/codex-watchdog-vscode
          node --check extension.js
          npm test
