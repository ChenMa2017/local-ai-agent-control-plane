name: Checks

on:
  push:
  pull_request:

jobs:
  full-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Install Python test dependency
        run: |
          python -m pip install --upgrade pip
          pip install -r modules/discord-adapter/requirements.txt

      - name: Run control-plane safety tools
        run: bash scripts/ci/check_control_plane.sh

      - name: Run codex-bridge checks
        run: bash scripts/ci/check_codex_bridge.sh

      - name: Run agent-host checks
        run: bash scripts/ci/check_agent_host.sh

      - name: Run discord-adapter py_compile checks
        run: bash scripts/ci/check_discord_adapter_py_compile.sh

      - name: Run discord-adapter unittest checks
        run: bash scripts/ci/run_discord_adapter_unittests.sh

      - name: Run host-ops checks
        run: bash scripts/ci/check_host_ops.sh

      - name: Run codex-watchdog-vscode checks
        run: bash scripts/ci/check_codex_watchdog_vscode.sh
